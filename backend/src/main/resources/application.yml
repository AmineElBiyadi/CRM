#fichier de configuration principal de notre backend Spring Boot, afin de centraliser tous les paramètres de l'application pour faciliter la gestion et la modification de la configuration(API, BD , serveur, JWT, ...) sans avoir à toucher ou recompiler le code source Java .De plus, il permet de charger des variables d'environnement (ex: via un fichier .env).

server:
  port: 8081

spring:
  application:
    name: smartestatehub
  config:
    import: 
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:CRM/.env[.properties]

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  #hange-la en ddl-auto: validate (qui vérifie la DB mais ne la modifie pas) ou ddl-auto: none (désactive tout).
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  ai:
    openai:
      # Placeholder when unset; mock beans are used (see OpenAiConfig).
      # Remove spring.autoconfigure.exclude OpenAiAutoConfiguration when using a real key.
      api-key: ${OPENAI_API_KEY:votre_cle_openai_ici}
      chat:
        options:
          model: gpt-4o
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimension: 1536
        database-name: ${DB_NAME:postgres}
        table-name: document_embeddings
        index-type: HNSW

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Sécurité JWT
jwt:
  secret: ${JWT_SECRET:default_super_secret_key_which_must_be_long_enough_to_meet_requirements_32_bytes}
  expiration: 3600000 # 1 heure (access token)
  refresh-expiration: 604800000 # 7 jours en ms (remember me)

app:
  cookie:
    secure: false # true en production (HTTPS)
  rapidapi:
    key: ${RAPIDAPI_KEY}
    host: ${RAPIDAPI_HOST:realty-in-us.p.rapidapi.com}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@smartestatehub.com}
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dam3isgtd}
    upload-preset: ${CLOUDINARY_UPLOAD_PRESET:Rawabet}

# Supervision Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always
